<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PatoChat - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #00ff88;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: #0a0e27;
            border: 2px solid #00ff88;
            padding: 40px;
            border-radius: 5px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            text-align: center;
            color: #00ff88;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #00aa55;
            margin-bottom: 30px;
            font-size: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #00ff88;
            font-weight: bold;
            font-size: 13px;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            background: #1a1f3a;
            border: 1px solid #00ff88;
            color: #00ff88;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            transition: all 0.3s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
            background: #0a0e27;
        }

        input::placeholder {
            color: #00aa55;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            flex: 1;
            padding: 12px;
            background: #00ff88;
            color: #0a0e27;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
        }

        button:hover {
            background: #00cc6a;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
            transform: translate(0, -2px);
        }

        .btn-registrar {
            background: #004d00;
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        .btn-registrar:hover {
            background: #006600;
            border-color: #00cc6a;
        }

        .error-message {
            background: #3a1a1a;
            border: 1px solid #ff4444;
            color: #ff8888;
            padding: 12px;
            border-radius: 3px;
            font-size: 12px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }

        .error-message.ativo {
            display: block;
        }

        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #00aa55;
        }

        .loading {
            display: none;
            text-align: center;
            color: #00aa55;
            font-size: 12px;
        }

        .spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .versao {
            text-align: center;
            color: #00aa55;
            font-size: 10px;
            margin-top: 20px;
        }

        #registerForm {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🦆</div>
        <h1>PatoChat</h1>
        <p class="subtitle">Seu WhatsApp pessoal com segurança</p>

        <div class="error-message" id="errorMsg"></div>
        <div class="loading" id="loading"><span class="spinner">⟳</span> Processando...</div>

        <!-- FORM LOGIN -->
        <div id="loginForm">
            <div class="form-group">
                <label for="loginUsername">👤 Usuário:</label>
                <input type="text" id="loginUsername" placeholder="Seu username..." minlength="3" maxlength="20">
            </div>

            <div class="form-group">
                <label for="loginPassword">🔐 Senha:</label>
                <input type="password" id="loginPassword" placeholder="Sua senha..." minlength="6">
            </div>

            <div class="btn-group">
                <button onclick="fazerLogin()">🚀 Entrar</button>
                <button class="btn-registrar" onclick="mostrarRegistro()">📝 Registrar</button>
            </div>
        </div>

        <!-- FORM REGISTRO -->
        <div id="registerForm">
            <div class="form-group">
                <label for="regUsername">👤 Novo Usuário:</label>
                <input type="text" id="regUsername" placeholder="Escolha um username..." minlength="3" maxlength="20">
            </div>

            <div class="form-group">
                <label for="regPassword">🔐 Nova Senha:</label>
                <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres..." minlength="6">
            </div>

            <div class="form-group">
                <label for="regPassword2">🔐 Confirmar:</label>
                <input type="password" id="regPassword2" placeholder="Confirme a senha..." minlength="6">
            </div>

            <div class="btn-group">
                <button onclick="fazerRegistro()">✓ Registrar</button>
                <button class="btn-registrar" onclick="voltarLogin()">✕ Cancelar</button>
            </div>
        </div>

        <div class="status" id="status"></div>
        <div class="versao">v2.0.0 • PatoChat Seguro</div>
    </div>

    <script>
        // Se já está logado, redireciona pro chat
        const token = localStorage.getItem('patochat_token');
        if (token) {
            window.location.href = 'index.html';
        }

        // URL DO SERVIDOR
        const SERVER_URL = 'https://rapidchat-p9g4.onrender.com';

        function mostrarRegistro() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('regUsername').focus();
        }

        function voltarLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('loginUsername').focus();
        }

        function fazerLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const senha = document.getElementById('loginPassword').value;

            if (!username || !senha) {
                mostrarErro('Preencha todos os campos');
                return;
            }

            mostrarLoading();

            fetch(`${SERVER_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, senha })
            })
            .then(r => r.json())
            .then(data => {
                if (data.erro) {
                    mostrarErro(data.erro);
                    esconderLoading();
                } else {
                    localStorage.setItem('patochat_token', data.token);
                    localStorage.setItem('patochat_usuario', data.username);
                    document.getElementById('status').textContent = '✓ Login realizado! Redirecionando...';
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 500);
                }
            })
            .catch(err => {
                mostrarErro('Erro ao conectar com servidor');
                console.error(err);
                esconderLoading();
            });
        }

        function fazerRegistro() {
            const username = document.getElementById('regUsername').value.trim();
            const senha = document.getElementById('regPassword').value;
            const senha2 = document.getElementById('regPassword2').value;

            if (!username || !senha || !senha2) {
                mostrarErro('Preencha todos os campos');
                return;
            }

            if (senha !== senha2) {
                mostrarErro('As senhas não conferem');
                return;
            }

            if (senha.length < 6) {
                mostrarErro('Senha muito curta');
                return;
            }

            mostrarLoading();

            fetch(`${SERVER_URL}/api/registrar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, senha })
            })
            .then(r => r.json())
            .then(data => {
                if (data.erro) {
                    mostrarErro(data.erro);
                    esconderLoading();
                } else {
                    localStorage.setItem('patochat_token', data.token);
                    localStorage.setItem('patochat_usuario', data.username);
                    document.getElementById('status').textContent = '✓ Usuário criado! Entrando...';
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 500);
                }
            })
            .catch(err => {
                mostrarErro('Erro ao registrar');
                console.error(err);
                esconderLoading();
            });
        }

        function mostrarErro(msg) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = '✗ ' + msg;
            errorEl.classList.add('ativo');
            setTimeout(() => errorEl.classList.remove('ativo'), 4000);
        }

        function mostrarLoading() {
            document.getElementById('loading').style.display = 'block';
        }

        function esconderLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        // Focus no primeiro input
        document.getElementById('loginUsername').focus();
    </script>
</body>
</html>
