<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PatoChat - WhatsApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0e27;
            color: #00ff88;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 300px;
            background: #1a1f3a;
            border-right: 2px solid #00ff88;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 2px solid #00ff88;
            background: #0a0e27;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
        }

        .sidebar-header .user-info {
            font-size: 12px;
            color: #00aa55;
            margin-top: 5px;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #00ff88;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #1a1f3a;
            color: #00ff88;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #0a0e27;
            border-bottom-color: #00ff88;
        }

        .tab-btn:hover {
            background: #252d4a;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 5px;
        }

        .chat-item {
            padding: 12px;
            margin: 3px 0;
            background: #252d4a;
            border-left: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            word-break: break-word;
            border-radius: 3px;
        }

        .chat-item:hover {
            background: #2d3d5c;
            border-left-color: #00ff88;
        }

        .chat-item.active {
            background: #1a3a2a;
            border-left-color: #00ff88;
            color: #00ff88;
        }

        .chat-item .nome {
            font-weight: bold;
            color: #00ff88;
        }

        .chat-item .preview {
            font-size: 11px;
            color: #00aa55;
            margin-top: 2px;
        }

        .sidebar-footer {
            padding: 10px;
            border-top: 1px solid #00ff88;
            background: #0a0e27;
        }

        .btn-sair {
            width: 100%;
            padding: 8px;
            background: #8b0000;
            color: #fff;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-sair:hover {
            background: #b00000;
        }

        /* MAIN CHAT */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0e27;
        }

        .chat-header {
            padding: 15px;
            background: #1a1f3a;
            border-bottom: 2px solid #00ff88;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 16px;
            color: #00ff88;
        }

        .chat-header .info {
            font-size: 12px;
            color: #00aa55;
        }

        .mensagens {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .mensagem {
            padding: 8px 12px;
            border-radius: 5px;
            max-width: 70%;
            word-wrap: break-word;
            font-size: 13px;
            display: flex;
            flex-direction: column;
        }

        .mensagem .usuario {
            font-weight: bold;
            font-size: 11px;
            margin-bottom: 2px;
            color: #00ff88;
        }

        .mensagem.minha {
            align-self: flex-end;
            background: #004d00;
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        .mensagem.outra {
            align-self: flex-start;
            background: #1a3a2a;
            color: #00ff88;
            border: 1px solid #00aa55;
        }

        .mensagem.sistema {
            align-self: center;
            background: #2d2d2d;
            color: #888;
            font-size: 11px;
            padding: 5px 10px;
            border: none;
        }

        .mensagem .hora {
            font-size: 10px;
            color: #00aa55;
            margin-top: 3px;
        }

        /* INPUT AREA */
        .input-area {
            padding: 15px;
            border-top: 2px solid #00ff88;
            background: #1a1f3a;
            display: flex;
            gap: 8px;
        }

        #texto-mensagem {
            flex: 1;
            padding: 10px;
            background: #0a0e27;
            border: 1px solid #00ff88;
            color: #00ff88;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        #texto-mensagem::placeholder {
            color: #00aa55;
        }

        #texto-mensagem:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .btn-enviar {
            padding: 10px 15px;
            background: #00ff88;
            color: #0a0e27;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-enviar:hover {
            background: #00cc6a;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        /* NOVO CHAT MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.ativo {
            display: flex;
        }

        .modal-content {
            background: #1a1f3a;
            padding: 20px;
            border-radius: 5px;
            border: 2px solid #00ff88;
            max-width: 400px;
            width: 90%;
        }

        .modal-content h3 {
            color: #00ff88;
            margin-bottom: 15px;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: #0a0e27;
            border: 1px solid #00ff88;
            color: #00ff88;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }

        .modal-content input::placeholder {
            color: #00aa55;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-criar {
            background: #00ff88;
            color: #0a0e27;
        }

        .btn-criar:hover {
            background: #00cc6a;
        }

        .btn-cancelar {
            background: #444;
            color: #fff;
        }

        .btn-cancelar:hover {
            background: #555;
        }

        /* NOVO CHAT PRIVADO */
        .novo-chat-btn {
            padding: 10px;
            margin: 5px;
            background: #00ff88;
            color: #0a0e27;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            width: calc(100% - 10px);
            transition: all 0.3s;
        }

        .novo-chat-btn:hover {
            background: #00cc6a;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #00aa55;
            text-align: center;
            flex-direction: column;
            gap: 15px;
        }

        .empty-state h3 {
            color: #00ff88;
            font-size: 18px;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1f3a;
        }

        ::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00cc6a;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                max-height: 150px;
            }

            .main-chat {
                display: none;
            }

            .container {
                flex-direction: column;
            }

            .chat-item .preview {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                🦆 PatoChat
                <div class="user-info" id="user-info">Carregando...</div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="trocarAba('global')">Global</button>
                <button class="tab-btn" onclick="trocarAba('privados')">Privados</button>
            </div>

            <div class="chats-list" id="chats-list"></div>

            <div class="sidebar-footer">
                <button class="novo-chat-btn" id="novo-chat-btn" onclick="abrirModalNovoChatPrivado()">+ Novo Chat</button>
                <button class="btn-sair" onclick="sair()">Sair</button>
            </div>
        </div>

        <!-- MAIN CHAT -->
        <div class="main-chat" id="main-chat">
            <div class="chat-header">
                <div>
                    <h2 id="chat-titulo">PatoChat Global 🌍</h2>
                    <div class="info" id="chat-info">Conectando...</div>
                </div>
            </div>
            <div class="mensagens" id="mensagens"></div>
            <div class="input-area">
                <input type="text" id="texto-mensagem" placeholder="Digite sua mensagem..." onkeypress="verificarEnter(event)">
                <button class="btn-enviar" onclick="enviarMensagem()">📤</button>
            </div>
        </div>
    </div>

    <!-- MODAL NOVO CHAT PRIVADO -->
    <div class="modal" id="modal-novo-chat">
        <div class="modal-content">
            <h3>💬 Novo Chat Privado</h3>
            <input type="text" id="input-usuario-privado" placeholder="Nome do usuário (ex: João)">
            <div class="modal-buttons">
                <button class="btn-criar" onclick="criarChatPrivado()">Criar</button>
                <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // CONFIGURAÇÃO
        const socket = io('https://rapidchat-p9g4.onrender.com');
        const meuUsuario = localStorage.getItem('pato_usuario');
        
        if (!meuUsuario) {
            window.location.href = "login.html";
        }

        // STATE
        let abaAtual = 'global';
        let chatAtual = 'global';
        let mensagensCache = {
            global: [],
            privados: {}
        };

        // INICIALIZAÇÃO
        document.getElementById('user-info').textContent = `👤 ${meuUsuario}`;
        socket.emit('user_connected', { user: meuUsuario });
        atualizarListaChats();

        // ===== EVENTOS SOCKET =====
        socket.on('chat message', (dados) => {
            if (dados.tipo === 'global') {
                mensagensCache.global.push(dados);
                if (chatAtual === 'global') {
                    adicionarMensagemAoChat(dados);
                }
            }
        });

        socket.on('private message', (dados) => {
            const chaveChat = gerarChaveChat(meuUsuario, dados.de);
            if (!mensagensCache.privados[chaveChat]) {
                mensagensCache.privados[chaveChat] = [];
            }
            mensagensCache.privados[chaveChat].push(dados);

            if (chatAtual === chaveChat) {
                adicionarMensagemAoChat(dados);
            }

            atualizarListaChats();
        });

        socket.on('user_list', (usuarios) => {
            document.getElementById('chat-info').textContent = `${usuarios.length} usuários online`;
        });

        socket.on('usuarios_conectados', (usuarios) => {
            document.getElementById('chat-info').textContent = `${usuarios.length} usuários online`;
        });

        // ===== FUNÇÕES DE CHAT =====
        function enviarMensagem() {
            const input = document.getElementById('texto-mensagem');
            const texto = input.value.trim();
            if (!texto) return;

            if (chatAtual === 'global') {
                socket.emit('chat message', {
                    user: meuUsuario,
                    msg: texto,
                    tipo: 'global',
                    timestamp: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
                });
            } else {
                const usuario_destino = chatAtual.replace(gerarChaveChat(meuUsuario, ''), '');
                socket.emit('private message', {
                    de: meuUsuario,
                    para: usuario_destino,
                    msg: texto,
                    timestamp: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
                });
            }

            input.value = '';
            input.focus();
        }

        function adicionarMensagemAoChat(dados) {
            const container = document.getElementById('mensagens');
            const div = document.createElement('div');
            div.className = 'mensagem';

            if (dados.de === meuUsuario || dados.user === meuUsuario) {
                div.classList.add('minha');
            } else {
                div.classList.add('outra');
            }

            const usuario = dados.user || dados.de;
            const mensagem = dados.msg;
            const hora = dados.timestamp || new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

            div.innerHTML = `
                <span class="usuario">${usuario}</span>
                <span>${mensagem}</span>
                <span class="hora">${hora}</span>
            `;

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // ===== NAVEGAÇÃO DE ABAS =====
        function trocarAba(aba) {
            abaAtual = aba;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (aba === 'global') {
                chatAtual = 'global';
            }

            atualizarListaChats();
            mostrarChat('global');
        }

        function atualizarListaChats() {
            const lista = document.getElementById('chats-list');
            lista.innerHTML = '';

            if (abaAtual === 'global') {
                const item = document.createElement('div');
                item.className = 'chat-item active';
                item.innerHTML = '🌍 <strong>Chat Global</strong><div class="preview">Todos podem ver</div>';
                item.onclick = () => mostrarChat('global');
                lista.appendChild(item);
            } else {
                if (Object.keys(mensagensCache.privados).length === 0) {
                    lista.innerHTML = '<div style="padding: 20px; color: #00aa55; text-align: center;">Nenhum chat privado ainda</div>';
                    return;
                }

                Object.keys(mensagensCache.privados).forEach(chaveChat => {
                    const usuario_outro = chaveChat.replace(gerarChaveChat(meuUsuario, ''), '');
                    const item = document.createElement('div');
                    item.className = 'chat-item' + (chatAtual === chaveChat ? ' active' : '');
                    
                    const ultimaMensagem = mensagensCache.privados[chaveChat].slice(-1)[0];
                    const preview = ultimaMensagem ? ultimaMensagem.msg.substring(0, 30) : '';

                    item.innerHTML = `
                        <div class="nome">💬 ${usuario_outro}</div>
                        <div class="preview">${preview}${preview.length === 30 ? '...' : ''}</div>
                    `;
                    item.onclick = () => mostrarChat(chaveChat);
                    lista.appendChild(item);
                });
            }
        }

        function mostrarChat(chaveChat) {
            chatAtual = chaveChat;
            atualizarListaChats();

            const container = document.getElementById('mensagens');
            container.innerHTML = '';

            const titulo = document.getElementById('chat-titulo');
            if (chaveChat === 'global') {
                titulo.textContent = '🌍 Chat Global';
                mensagensCache.global.forEach(msg => adicionarMensagemAoChat(msg));
            } else {
                const usuario = chaveChat.replace(gerarChaveChat(meuUsuario, ''), '');
                titulo.textContent = `💬 ${usuario}`;
                if (mensagensCache.privados[chaveChat]) {
                    mensagensCache.privados[chaveChat].forEach(msg => adicionarMensagemAoChat(msg));
                }
            }

            container.scrollTop = container.scrollHeight;
        }

        // ===== CHATS PRIVADOS =====
        function gerarChaveChat(user1, user2) {
            return [user1, user2].sort().join('_');
        }

        function abrirModalNovoChatPrivado() {
            document.getElementById('modal-novo-chat').classList.add('ativo');
            document.getElementById('input-usuario-privado').focus();
        }

        function fecharModal() {
            document.getElementById('modal-novo-chat').classList.remove('ativo');
            document.getElementById('input-usuario-privado').value = '';
        }

        function criarChatPrivado() {
            const usuario = document.getElementById('input-usuario-privado').value.trim();
            if (!usuario) {
                alert('Digite um nome de usuário');
                return;
            }

            if (usuario === meuUsuario) {
                alert('Você não pode conversar com você mesmo!');
                return;
            }

            const chaveChat = gerarChaveChat(meuUsuario, usuario);
            if (!mensagensCache.privados[chaveChat]) {
                mensagensCache.privados[chaveChat] = [];
            }

            fecharModal();
            trocarAba('privados');
            mostrarChat(chaveChat);
        }

        // ===== UTILIDADES =====
        function verificarEnter(event) {
            if (event.key === 'Enter') {
                enviarMensagem();
            }
        }

        function sair() {
            localStorage.removeItem('pato_usuario');
            window.location.href = "login.html";
        }

        // Fechar modal ao clicar fora
        document.getElementById('modal-novo-chat').onclick = function(event) {
            if (event.target === this) {
                fecharModal();
            }
        };
    </script>
</body>
</html>
