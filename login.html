<div id="login-screen" style="background: white; padding: 20px; border-radius: 10px; text-align: center;">
    <h2>Entrar no PatoChat</h2>
    <input type="text" id="username" placeholder="Nome de usuário"><br><br>
    <input type="password" id="password" placeholder="Senha"><br><br>
    <button onclick="cadastrar()">Criar Conta</button>
    <button onclick="logar()">Entrar</button>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
    // CONEXÃO COM A RENDER (Use exatamente o link que apareceu no seu log verde)
    const socket = io('https://rapidchat-p9g4.onrender.com');

    // Função do botão Criar Conta
    function cadastrar() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        
        if(!user || !pass) return alert("Preencha todos os campos!");
        
        // Envia para o servidor
        socket.emit('novo usuario', { user: user, pass: pass });
    }

    // Função do botão Entrar
    function logar() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        
        if(!user || !pass) return alert("Preencha todos os campos!");
        
        // Envia para o servidor
        socket.emit('tentar login', { user: user, pass: pass });
    }

    // RESPOSTAS DO SERVIDOR:
    socket.on('cadastro sucesso', () => {
        alert('Conta criada com sucesso! Agora é só clicar em Entrar.');
    });

    socket.on('login sucesso', () => {
        // Guarda o usuário logado para usar no chat
        const user = document.getElementById('username').value;
        localStorage.setItem('pato_usuario', user);
        
        alert('Logado com sucesso!');
        // Pula para a página do chat
        window.location.href = "index.html"; 
    });

    socket.on('erro', (msg) => {
        alert(msg); // Vai mostrar se o usuário já existe ou se a senha está errada
    });
</script>
