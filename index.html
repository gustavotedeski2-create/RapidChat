<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PatoChat - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #00ff88;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: #0a0e27;
            border: 2px solid #00ff88;
            padding: 40px;
            border-radius: 5px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            text-align: center;
            color: #00ff88;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #00aa55;
            margin-bottom: 30px;
            font-size: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #00ff88;
            font-weight: bold;
            font-size: 13px;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            background: #1a1f3a;
            border: 1px solid #00ff88;
            color: #00ff88;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            transition: all 0.3s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
            background: #0a0e27;
        }

        input::placeholder {
            color: #00aa55;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            flex: 1;
            padding: 12px;
            background: #00ff88;
            color: #0a0e27;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
        }

        button:hover {
            background: #00cc6a;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
            transform: translate(0, -2px);
        }

        .btn-registrar {
            background: #004d00;
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        .btn-registrar:hover {
            background: #006600;
            border-color: #00cc6a;
        }

        .error-message {
            background: #3a1a1a;
            border: 1px solid #ff4444;
            color: #ff8888;
            padding: 12px;
            border-radius: 3px;
            font-size: 12px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }

        .error-message.ativo {
            display: block;
        }

        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #00aa55;
        }

        .loading {
            display: none;
            text-align: center;
            color: #00aa55;
            font-size: 12px;
        }

        .spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .versao {
            text-align: center;
            color: #00aa55;
            font-size: 10px;
            margin-top: 20px;
        }

        .modal-chat {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e27;
            z-index: 1000;
        }

        .modal-chat.ativo {
            display: flex;
            flex-direction: column;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background: #1a1f3a;
            border-right: 2px solid #00ff88;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 2px solid #00ff88;
            background: #0a0e27;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
        }

        .sidebar-header .user-info {
            font-size: 12px;
            color: #00aa55;
            margin-top: 5px;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #00ff88;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #1a1f3a;
            color: #00ff88;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #0a0e27;
            border-bottom-color: #00ff88;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 5px;
        }

        .chat-item {
            padding: 12px;
            margin: 3px 0;
            background: #252d4a;
            border-left: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            word-break: break-word;
            border-radius: 3px;
        }

        .chat-item:hover {
            background: #2d3d5c;
            border-left-color: #00ff88;
        }

        .chat-item.active {
            background: #1a3a2a;
            border-left-color: #00ff88;
            color: #00ff88;
        }

        .chat-item .nome {
            font-weight: bold;
            color: #00ff88;
        }

        .chat-item .preview {
            font-size: 11px;
            color: #00aa55;
            margin-top: 2px;
        }

        .sidebar-footer {
            padding: 10px;
            border-top: 1px solid #00ff88;
            background: #0a0e27;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .novo-chat-btn, .btn-sair {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.3s;
        }

        .novo-chat-btn {
            background: #00ff88;
            color: #0a0e27;
        }

        .novo-chat-btn:hover {
            background: #00cc6a;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .btn-sair {
            background: #8b0000;
            color: #fff;
        }

        .btn-sair:hover {
            background: #b00000;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0e27;
        }

        .chat-header {
            padding: 15px;
            background: #1a1f3a;
            border-bottom: 2px solid #00ff88;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 16px;
            color: #00ff88;
        }

        .chat-header .info {
            font-size: 12px;
            color: #00aa55;
        }

        .mensagens {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .mensagem {
            padding: 8px 12px;
            border-radius: 5px;
            max-width: 70%;
            word-wrap: break-word;
            font-size: 13px;
            display: flex;
            flex-direction: column;
        }

        .mensagem .usuario {
            font-weight: bold;
            font-size: 11px;
            margin-bottom: 2px;
            color: #00ff88;
        }

        .mensagem.minha {
            align-self: flex-end;
            background: #004d00;
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        .mensagem.outra {
            align-self: flex-start;
            background: #1a3a2a;
            color: #00ff88;
            border: 1px solid #00aa55;
        }

        .mensagem img {
            max-width: 300px;
            border-radius: 3px;
            margin-top: 5px;
        }

        .mensagem .hora {
            font-size: 10px;
            color: #00aa55;
            margin-top: 3px;
        }

        .input-area {
            padding: 15px;
            border-top: 2px solid #00ff88;
            background: #1a1f3a;
            display: flex;
            gap: 8px;
        }

        input[type="text"].msg-input {
            flex: 1;
            padding: 10px;
            background: #0a0e27;
            border: 1px solid #00ff88;
            color: #00ff88;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        input[type="text"].msg-input:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        input[type="text"].msg-input::placeholder {
            color: #00aa55;
        }

        .btn-enviar, .btn-imagem {
            padding: 10px 15px;
            background: #00ff88;
            color: #0a0e27;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-enviar:hover, .btn-imagem:hover {
            background: #00cc6a;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        #fileInput {
            display: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        .modal.ativo {
            display: flex;
        }

        .modal-content {
            background: #1a1f3a;
            padding: 20px;
            border-radius: 5px;
            border: 2px solid #00ff88;
            max-width: 400px;
            width: 90%;
        }

        .modal-content h3 {
            color: #00ff88;
            margin-bottom: 15px;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: #0a0e27;
            border: 1px solid #00ff88;
            color: #00ff88;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
        }

        .btn-cancelar {
            background: #444;
            color: #fff;
        }

        .btn-cancelar:hover {
            background: #555;
        }

        .call-modal {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1a1f3a;
            border: 2px solid #00ff88;
            border-radius: 10px;
            padding: 20px;
            z-index: 2000;
            min-width: 300px;
            max-width: 500px;
            display: none;
        }

        .call-modal.ativo {
            display: flex;
            flex-direction: column;
        }

        .call-modal video {
            width: 100%;
            border-radius: 5px;
            background: #000;
            margin-bottom: 10px;
        }

        .call-modal .video-remote {
            width: 100%;
            height: 300px;
            background: #000;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .call-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn-call {
            padding: 10px 15px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }

        .btn-call-green {
            background: #00ff88;
            color: #0a0e27;
        }

        .btn-call-green:hover {
            background: #00cc6a;
        }

        .btn-call-red {
            background: #ff4444;
            color: #fff;
        }

        .btn-call-red:hover {
            background: #cc0000;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1f3a;
        }

        ::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 4px;
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1f3a;
            border: 2px solid #00ff88;
            color: #00ff88;
            padding: 15px;
            border-radius: 5px;
            z-index: 2001;
            display: none;
            max-width: 90%;
        }

        .notification.ativo {
            display: block;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                max-height: 150px;
            }

            .main-chat {
                display: none;
            }

            .container {
                flex-direction: column;
            }

            .chat-item .preview {
                display: none;
            }

            .mensagem {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div class="login-container" id="loginContainer">
        <div class="logo">🦆</div>
        <h1>PatoChat</h1>
        <p class="subtitle">Seu WhatsApp pessoal com segurança</p>

        <div class="error-message" id="errorMsg"></div>
        <div class="loading" id="loading"><span class="spinner">⟳</span> Processando...</div>

        <div class="form-group">
            <label for="loginUsername">👤 Usuário:</label>
            <input type="text" id="loginUsername" placeholder="Seu username..." minlength="3" maxlength="20">
        </div>

        <div class="form-group">
            <label for="loginPassword">🔐 Senha:</label>
            <input type="password" id="loginPassword" placeholder="Sua senha..." minlength="6">
        </div>

        <div class="btn-group">
            <button onclick="fazerLogin()">🚀 Entrar</button>
            <button class="btn-registrar" onclick="mostrarRegistro()">📝 Registrar</button>
        </div>

        <div id="registerForm" style="display: none;">
            <div class="form-group">
                <label for="regUsername">👤 Novo Usuário:</label>
                <input type="text" id="regUsername" placeholder="Escolha um username..." minlength="3" maxlength="20">
            </div>

            <div class="form-group">
                <label for="regPassword">🔐 Nova Senha:</label>
                <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres..." minlength="6">
            </div>

            <div class="form-group">
                <label for="regPassword2">🔐 Confirmar:</label>
                <input type="password" id="regPassword2" placeholder="Confirme a senha..." minlength="6">
            </div>

            <div class="btn-group">
                <button onclick="fazerRegistro()">✓ Registrar</button>
                <button class="btn-registrar" onclick="voltarLogin()">✕ Cancelar</button>
            </div>
        </div>

        <div class="status" id="status"></div>
        <div class="versao">v2.0.0 • PatoChat Seguro</div>
    </div>

    <!-- CHAT -->
    <div class="modal-chat" id="chatModal">
        <div class="container">
            <!-- SIDEBAR -->
            <div class="sidebar">
                <div class="sidebar-header">
                    🦆 PatoChat
                    <div class="user-info" id="userInfo">Carregando...</div>
                </div>

                <div class="tabs">
                    <button class="tab-btn active" onclick="trocarAba('global')">Global</button>
                    <button class="tab-btn" onclick="trocarAba('privados')">Privados</button>
                </div>

                <div class="chats-list" id="chatsList"></div>

                <div class="sidebar-footer">
                    <button class="novo-chat-btn" onclick="abrirModalNovoChat()">+ Novo Chat</button>
                    <button class="btn-sair" onclick="sair()">Sair</button>
                </div>
            </div>

            <!-- MAIN CHAT -->
            <div class="main-chat">
                <div class="chat-header">
                    <div>
                        <h2 id="chatTitulo">🌍 Chat Global</h2>
                        <div class="info" id="chatInfo">Conectando...</div>
                    </div>
                    <button id="btnChamar" onclick="iniciarChamada()" style="display: none; background: #ff9800; padding: 8px 15px; cursor: pointer; border: none; color: white; border-radius: 3px; font-family: Courier New;">☎️ Chamar</button>
                </div>
                <div class="mensagens" id="mensagens"></div>
                <div class="input-area">
                    <input type="text" class="msg-input" id="textoMensagem" placeholder="Sua mensagem..." onkeypress="verificarEnter(event)">
                    <button class="btn-imagem" onclick="document.getElementById('fileInput').click()">🖼️</button>
                    <button class="btn-enviar" onclick="enviarMensagem()">📤</button>
                </div>
            </div>
        </div>

        <input type="file" id="fileInput" accept="image/*" onchange="enviarImagem()">
    </div>

    <!-- MODAL NOVO CHAT -->
    <div class="modal" id="modalNovoChat">
        <div class="modal-content">
            <h3>💬 Novo Chat Privado</h3>
            <input type="text" id="inputUsuarioPrivado" placeholder="Nome do usuário...">
            <div class="modal-buttons">
                <button onclick="criarChatPrivado()" style="background: #00ff88; color: #0a0e27;">Criar</button>
                <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- NOTIFICATION -->
    <div class="notification" id="notification"></div>

    <!-- VIDEOCHAMADA -->
    <div class="call-modal" id="callModal">
        <h3 id="callTitle">📞 Chamada</h3>
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="video-remote" id="remoteVideo"></div>
        <div class="call-buttons">
            <button class="btn-call btn-call-red" onclick="finalizarChamada()">📞</button>
            <button class="btn-call btn-call-green" id="micBtn" onclick="toggleMic()">🎤</button>
            <button class="btn-call btn-call-green" id="cameraBtn" onclick="toggleCamera()">📷</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // ===== CONFIGURAÇÃO =====
        const SERVER_URL = 'https://patochat-server.onrender.com'; // Mude para sua URL do Render
        const socket = io(SERVER_URL);

        let token = localStorage.getItem('patochat_token');
        let usuarioAtual = localStorage.getItem('patochat_usuario');
        let abaAtual = 'global';
        let chatAtual = 'global';
        let mensagensCache = { global: [], privados: {} };

        // WebRTC
        let peerConnection;
        let localStream;
        let chamadaAtiva = null;
        let usuarioChamada = null;

        // ===== AUTENTICAÇÃO =====

        function mostrarLogin() {
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('chatModal').classList.remove('ativo');
        }

        function mostrarRegistro() {
            document.getElementById('registerForm').style.display = 'block';
            document.querySelector('input[type="text"]:first-of-type').parentElement.parentElement.style.display = 'none';
            document.querySelector('input[type="password"]:first-of-type').parentElement.parentElement.style.display = 'none';
        }

        function voltarLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.querySelector('input[type="text"]:first-of-type').parentElement.parentElement.style.display = 'block';
            document.querySelector('input[type="password"]:first-of-type').parentElement.parentElement.style.display = 'block';
        }

        function fazerLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const senha = document.getElementById('loginPassword').value;

            if (!username || !senha) {
                mostrarErro('Preencha todos os campos');
                return;
            }

            mostrarLoading();

            fetch(`${SERVER_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, senha })
            })
            .then(r => r.json())
            .then(data => {
                if (data.erro) {
                    mostrarErro(data.erro);
                    esconderLoading();
                } else {
                    localStorage.setItem('patochat_token', data.token);
                    localStorage.setItem('patochat_usuario', data.username);
                    entrarNoChat(data.token, data.username);
                }
            })
            .catch(err => {
                mostrarErro('Erro ao conectar com servidor');
                console.error(err);
                esconderLoading();
            });
        }

        function fazerRegistro() {
            const username = document.getElementById('regUsername').value.trim();
            const senha = document.getElementById('regPassword').value;
            const senha2 = document.getElementById('regPassword2').value;

            if (!username || !senha || !senha2) {
                mostrarErro('Preencha todos os campos');
                return;
            }

            if (senha !== senha2) {
                mostrarErro('As senhas não conferem');
                return;
            }

            if (senha.length < 6) {
                mostrarErro('Senha muito curta');
                return;
            }

            mostrarLoading();

            fetch(`${SERVER_URL}/api/registrar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, senha })
            })
            .then(r => r.json())
            .then(data => {
                if (data.erro) {
                    mostrarErro(data.erro);
                    esconderLoading();
                } else {
                    localStorage.setItem('patochat_token', data.token);
                    localStorage.setItem('patochat_usuario', data.username);
                    entrarNoChat(data.token, data.username);
                }
            })
            .catch(err => {
                mostrarErro('Erro ao registrar');
                console.error(err);
                esconderLoading();
            });
        }

        function entrarNoChat(token, username) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('chatModal').classList.add('ativo');
            document.getElementById('userInfo').textContent = `👤 ${username}`;

            socket.emit('autenticar', { token });
            socket.on('carregarHistorico', (dados) => {
                if (dados.tipo === 'global') {
                    mensagensCache.global = dados.mensagens;
                    mostrarChat('global');
                }
            });

            esconderLoading();
        }

        // ===== SOCKET EVENTS =====

        socket.on('chat_message', (dados) => {
            mensagensCache.global.push(dados);
            if (chatAtual === 'global') {
                adicionarMensagemAoChat(dados);
            }
        });

        socket.on('private_message', (dados) => {
            const outro = dados.de === usuarioAtual ? dados.para : dados.de;
            const chaveChat = [usuarioAtual, outro].sort().join('_');
            
            if (!mensagensCache.privados[chaveChat]) {
                mensagensCache.privados[chaveChat] = [];
            }
            mensagensCache.privados[chaveChat].push(dados);

            if (chatAtual === chaveChat) {
                adicionarMensagemAoChat(dados);
            }

            atualizarListaChats();
        });

        socket.on('enviar_imagem', (dados) => {
            if (dados.para === 'global' && chatAtual === 'global') {
                adicionarMensagemAoChat(dados);
            } else if (dados.para === chatAtual) {
                adicionarMensagemAoChat(dados);
            }

            if (dados.para !== 'global') {
                const outro = dados.de === usuarioAtual ? dados.para : dados.de;
                const chaveChat = [usuarioAtual, outro].sort().join('_');
                if (!mensagensCache.privados[chaveChat]) {
                    mensagensCache.privados[chaveChat] = [];
                }
                mensagensCache.privados[chaveChat].push(dados);
                atualizarListaChats();
            }
        });

        socket.on('usuario_online', (dados) => {
            console.log(`✓ ${dados.usuario} online`);
        });

        socket.on('usuario_offline', (dados) => {
            console.log(`✗ ${dados.usuario} offline`);
        });

        socket.on('chamada_recebida', async (dados) => {
            if (confirm(`${dados.de} está chamando você. Aceitar?`)) {
                chamadaAtiva = dados.chamadaId;
                usuarioChamada = dados.de;
                socket.emit('aceitar_chamada', { chamadaId: dados.chamadaId, de: dados.de });
                iniciarStreamLocal();
            } else {
                socket.emit('recusar_chamada', { chamadaId: dados.chamadaId, de: dados.de });
            }
        });

        socket.on('chamada_aceita', async (dados) => {
            chamadaAtiva = dados.chamadaId;
            usuarioChamada = dados.para;
            iniciarStreamLocal();
            criarOffer();
        });

        socket.on('webrtc_offer', async (dados) => {
            if (!peerConnection) {
                iniciarStreamLocal();
                criarPeerConnection();
            }

            await peerConnection.setRemoteDescription(new RTCSessionDescription(dados.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('webrtc_answer', { para: dados.de, answer });
        });

        socket.on('webrtc_answer', async (dados) => {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(dados.answer));
        });

        socket.on('webrtc_ice', async (dados) => {
            try {
                await peerConnection.addIceCandidate(new RTCIceCandidate(dados.candidate));
            } catch (err) {
                console.error('Erro ao adicionar ICE candidate:', err);
            }
        });

        socket.on('chamada_finalizada', () => {
            finalizarChamada();
        });

        // ===== CHAT FUNCTIONS =====

        function enviarMensagem() {
            const input = document.getElementById('textoMensagem');
            const texto = input.value.trim();

            if (!texto) return;

            if (chatAtual === 'global') {
                socket.emit('chat_message', { msg: texto });
            } else {
                const usuario = chatAtual.replace(usuarioAtual + '_', '').replace('_' + usuarioAtual, '');
                socket.emit('private_message', { para: usuario, msg: texto });
            }

            input.value = '';
            input.focus();
        }

        function adicionarMensagemAoChat(dados) {
            const container = document.getElementById('mensagens');
            const div = document.createElement('div');
            div.className = 'mensagem';

            if (dados.de === usuarioAtual || dados.user === usuarioAtual) {
                div.classList.add('minha');
            } else {
                div.classList.add('outra');
            }

            const usuario = dados.user || dados.de;
            const hora = dados.timestamp || new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

            let conteudo = `<span class="usuario">${usuario}</span>`;

            if (dados.tipo === 'imagem') {
                conteudo += `<img src="${dados.imagemUrl}" alt="Imagem">`;
            } else {
                conteudo += `<span>${dados.msg}</span>`;
            }

            conteudo += `<span class="hora">${hora}</span>`;
            div.innerHTML = conteudo;

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function trocarAba(aba) {
            abaAtual = aba;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (aba === 'global') {
                chatAtual = 'global';
                document.getElementById('btnChamar').style.display = 'none';
            }

            atualizarListaChats();
            mostrarChat(aba === 'global' ? 'global' : Object.keys(mensagensCache.privados)[0] || 'global');
        }

        function atualizarListaChats() {
            const lista = document.getElementById('chatsList');
            lista.innerHTML = '';

            if (abaAtual === 'global') {
                const item = document.createElement('div');
                item.className = 'chat-item active';
                item.innerHTML = '🌍 <strong>Chat Global</strong><div class="preview">Todos podem ver</div>';
                item.onclick = () => mostrarChat('global');
                lista.appendChild(item);
            } else {
                if (Object.keys(mensagensCache.privados).length === 0) {
                    lista.innerHTML = '<div style="padding: 20px; color: #00aa55; text-align: center;">Nenhum chat privado</div>';
                    return;
                }

                Object.keys(mensagensCache.privados).forEach(chaveChat => {
                    const usuario = chaveChat.replace(usuarioAtual + '_', '').replace('_' + usuarioAtual, '');
                    const item = document.createElement('div');
                    item.className = 'chat-item' + (chatAtual === chaveChat ? ' active' : '');
                    
                    const ultimaMensagem = mensagensCache.privados[chaveChat].slice(-1)[0];
                    const preview = ultimaMensagem ? (ultimaMensagem.tipo === 'imagem' ? '[Imagem]' : ultimaMensagem.msg.substring(0, 30)) : '';

                    item.innerHTML = `<div class="nome">💬 ${usuario}</div><div class="preview">${preview}${preview.length === 30 ? '...' : ''}</div>`;
                    item.onclick = () => mostrarChat(chaveChat);
                    lista.appendChild(item);
                });
            }
        }

        function mostrarChat(chaveChat) {
            chatAtual = chaveChat;
            atualizarListaChats();

            const container = document.getElementById('mensagens');
            container.innerHTML = '';

            const titulo = document.getElementById('chatTitulo');
            if (chaveChat === 'global') {
                titulo.textContent = '🌍 Chat Global';
                document.getElementById('btnChamar').style.display = 'none';
                mensagensCache.global.forEach(msg => adicionarMensagemAoChat(msg));
            } else {
                const usuario = chaveChat.replace(usuarioAtual + '_', '').replace('_' + usuarioAtual, '');
                titulo.textContent = `💬 ${usuario}`;
                document.getElementById('btnChamar').style.display = 'block';
                document.getElementById('btnChamar').onclick = () => iniciarChamada(usuario);
                if (mensagensCache.privados[chaveChat]) {
                    mensagensCache.privados[chaveChat].forEach(msg => adicionarMensagemAoChat(msg));
                }
            }

            container.scrollTop = container.scrollHeight;
        }

        function abrirModalNovoChat() {
            document.getElementById('modalNovoChat').classList.add('ativo');
            document.getElementById('inputUsuarioPrivado').focus();
        }

        function fecharModal() {
            document.getElementById('modalNovoChat').classList.remove('ativo');
            document.getElementById('inputUsuarioPrivado').value = '';
        }

        function criarChatPrivado() {
            const usuario = document.getElementById('inputUsuarioPrivado').value.trim();
            if (!usuario) {
                mostrarErro('Digite um nome');
                return;
            }

            if (usuario === usuarioAtual) {
                mostrarErro('Você não pode conversar com você mesmo!');
                return;
            }

            const chaveChat = [usuarioAtual, usuario].sort().join('_');
            if (!mensagensCache.privados[chaveChat]) {
                mensagensCache.privados[chaveChat] = [];
            }

            fecharModal();
            trocarAba('privados');
            mostrarChat(chaveChat);
        }

        function enviarImagem() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('imagem', file);

            mostrarNotificacao('📤 Enviando imagem...');

            fetch(`${SERVER_URL}/api/upload`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                if (data.imagemUrl) {
                    if (chatAtual === 'global') {
                        socket.emit('enviar_imagem', { para: 'global', imagemUrl: data.imagemUrl });
                    } else {
                        const usuario = chatAtual.replace(usuarioAtual + '_', '').replace('_' + usuarioAtual, '');
                        socket.emit('enviar_imagem', { para: usuario, imagemUrl: data.imagemUrl });
                    }
                    document.getElementById('fileInput').value = '';
                    mostrarNotificacao('✓ Imagem enviada');
                }
            })
            .catch(err => mostrarErro('Erro ao enviar imagem'));
        }

        // ===== WebRTC / VIDEOCHAMADA =====

        function iniciarChamada(usuario) {
            usuarioChamada = usuario || chatAtual.replace(usuarioAtual + '_', '').replace('_' + usuarioAtual, '');
            socket.emit('iniciar_chamada', { para: usuarioChamada });
            mostrarNotificacao(`📞 Chamando ${usuarioChamada}...`);
        }

        function iniciarStreamLocal() {
            navigator.mediaDevices.getUserMedia({ audio: true, video: true })
                .then(stream => {
                    localStream = stream;
                    document.getElementById('localVideo').srcObject = stream;
                    document.getElementById('callModal').classList.add('ativo');
                    
                    if (!peerConnection) {
                        criarPeerConnection();
                        stream.getTracks().forEach(track => {
                            peerConnection.addTrack(track, stream);
                        });
                    }
                })
                .catch(err => {
                    mostrarErro('Erro ao acessar câmera/microfone');
                    console.error(err);
                });
        }

        function criarPeerConnection() {
            const config = {
                iceServers: [
                    { urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] }
                ]
            };

            peerConnection = new RTCPeerConnection(config);

            peerConnection.ontrack = (event) => {
                const remoteVideo = document.getElementById('remoteVideo');
                if (remoteVideo.srcObject !== event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                }
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('webrtc_ice', { para: usuarioChamada, candidate: event.candidate });
                }
            };
        }

        async function criarOffer() {
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('webrtc_offer', { para: usuarioChamada, offer });
        }

        function toggleMic() {
            localStream.getAudioTracks().forEach(track => {
                track.enabled = !track.enabled;
                document.getElementById('micBtn').style.opacity = track.enabled ? '1' : '0.5';
            });
        }

        function toggleCamera() {
            localStream.getVideoTracks().forEach(track => {
                track.enabled = !track.enabled;
                document.getElementById('cameraBtn').style.opacity = track.enabled ? '1' : '0.5';
            });
        }

        function finalizarChamada() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }

            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }

            document.getElementById('callModal').classList.remove('ativo');
            document.getElementById('localVideo').srcObject = null;
            document.getElementById('remoteVideo').srcObject = null;

            if (chamadaAtiva) {
                socket.emit('finalizar_chamada', { chamadaId: chamadaAtiva, duracao: 0 });
                chamadaAtiva = null;
            }

            usuarioChamada = null;
        }

        // ===== UTILIDADES =====

        function verificarEnter(event) {
            if (event.key === 'Enter') {
                enviarMensagem();
            }
        }

        function sair() {
            localStorage.removeItem('patochat_token');
            localStorage.removeItem('patochat_usuario');
            finalizarChamada();
            location.reload();
        }

        function mostrarErro(msg) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = '✗ ' + msg;
            errorEl.classList.add('ativo');
            setTimeout(() => errorEl.classList.remove('ativo'), 4000);
        }

        function mostrarNotificacao(msg) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.classList.add('ativo');
            setTimeout(() => notif.classList.remove('ativo'), 3000);
        }

        function mostrarLoading() {
            document.getElementById('loading').style.display = 'block';
        }

        function esconderLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        document.getElementById('modalNovoChat').onclick = function(e) {
            if (e.target === this) fecharModal();
        };

        // Verificar se já está logado
        if (token && usuarioAtual) {
            entrarNoChat(token, usuarioAtual);
        }

        // Focus no primeiro input
        document.getElementById('loginUsername').focus();
    </script>
</body>
