<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PatoChat - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #00ff88;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #0a0e27;
            border: 2px solid #00ff88;
            padding: 40px;
            border-radius: 5px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            text-align: center;
            color: #00ff88;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #00aa55;
            margin-bottom: 30px;
            font-size: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #00ff88;
            font-weight: bold;
            font-size: 13px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #1a1f3a;
            border: 1px solid #00ff88;
            color: #00ff88;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
            background: #0a0e27;
        }

        input[type="text"]::placeholder {
            color: #00aa55;
        }

        .btn-entrar {
            width: 100%;
            padding: 12px;
            background: #00ff88;
            color: #0a0e27;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .btn-entrar:hover {
            background: #00cc6a;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
            transform: translate(0, -2px);
        }

        .btn-entrar:active {
            transform: translate(0, 0);
        }

        .info-message {
            background: #1a3a2a;
            border: 1px solid #00aa55;
            color: #00ff88;
            padding: 12px;
            border-radius: 3px;
            font-size: 12px;
            text-align: center;
            margin-top: 20px;
        }

        .error-message {
            background: #3a1a1a;
            border: 1px solid #ff4444;
            color: #ff8888;
            padding: 12px;
            border-radius: 3px;
            font-size: 12px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }

        .error-message.ativo {
            display: block;
        }

        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #00aa55;
        }

        .loading {
            display: none;
            text-align: center;
            color: #00aa55;
            font-size: 12px;
        }

        .spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .versao {
            text-align: center;
            color: #00aa55;
            font-size: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🦆</div>
        <h1>PatoChat</h1>
        <p class="subtitle">Seu WhatsApp pessoal</p>

        <div class="error-message" id="error-msg"></div>
        <div class="loading" id="loading">
            <span class="spinner">⟳</span> Entrando...
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">👤 Nome de Usuário:</label>
                <input 
                    type="text" 
                    id="username" 
                    placeholder="Digite seu nome..." 
                    required
                    autocomplete="off"
                    minlength="3"
                    maxlength="20"
                >
            </div>

            <button type="submit" class="btn-entrar">🚀 Entrar no Chat</button>
        </form>

        <div class="info-message">
            💡 Use um nome único para identificar você no chat. Nomes devem ter entre 3 e 20 caracteres.
        </div>

        <div class="status" id="status"></div>

        <div class="versao">v1.0.0 • PatoChat Global</div>
    </div>

    <script>
        // Já está logado? Redireciona direto
        const usuarioSalvo = localStorage.getItem('pato_usuario');
        if (usuarioSalvo) {
            window.location.href = 'whatsapp.html';
        }

        function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const form = document.getElementById('login-form');
            const errorMsg = document.getElementById('error-msg');
            const loading = document.getElementById('loading');
            const status = document.getElementById('status');

            // Validações
            if (username.length < 3) {
                mostrarErro('Nome deve ter no mínimo 3 caracteres');
                return;
            }

            if (username.length > 20) {
                mostrarErro('Nome não pode ter mais de 20 caracteres');
                return;
            }

            // Caracteres especiais
            if (!/^[a-zA-Z0-9_-]+$/.test(username)) {
                mostrarErro('Use apenas letras, números, underscore e hífen');
                return;
            }

            // Mostra loading
            loading.style.display = 'block';
            form.style.opacity = '0.5';
            form.style.pointerEvents = 'none';
            errorMsg.classList.remove('ativo');

            // Simula uma pequena espera (validação do servidor)
            setTimeout(() => {
                localStorage.setItem('pato_usuario', username);
                status.textContent = '✓ Login realizado com sucesso!';
                
                setTimeout(() => {
                    window.location.href = 'whatsapp.html';
                }, 500);
            }, 800);
        }

        function mostrarErro(mensagem) {
            const errorMsg = document.getElementById('error-msg');
            errorMsg.textContent = '✗ ' + mensagem;
            errorMsg.classList.add('ativo');

            setTimeout(() => {
                errorMsg.classList.remove('ativo');
            }, 4000);
        }

        // Focus no input automaticamente
        document.getElementById('username').focus();

        // Enter para submeter
        document.getElementById('username').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                document.getElementById('login-form').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
